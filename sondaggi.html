<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vota Sondaggio - Salvatore</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #ecf0f1; --text: #333; --orange: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); }
        
        /* Navbar & Header */
        nav { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.9em; }
        header { background-color: var(--primary); color: white; padding: 1rem; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .container { display: flex; max-width: 1400px; margin: 20px auto; gap: 20px; padding: 0 15px; }

        /* SIDEBAR SINISTRA (Filtri) */
        aside.sidebar-left { width: 280px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: fit-content; position: sticky; top: 20px; }
        .filter-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9em; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }

        /* MAIN (Griglia Giochi) */
        main { flex-grow: 1; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .game-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .game-card img { width: 100%; height: 140px; object-fit: cover; }
        .game-card-content { padding: 12px; flex-grow: 1; }
        .game-card h4 { margin: 0 0 8px 0; font-size: 1em; color: var(--primary); }
        
        .btn-vota { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-vota:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* SIDEBAR DESTRA (Classifica) */
        aside.sidebar-right { width: 250px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: fit-content; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .rank-count { background: var(--orange); color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

        @media (max-width: 1024px) { .container { flex-direction: column; } aside { width: 100% !important; position: static !important; } }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold; font-size: 1.2em;">🎲 My Boardgame Collection</div>
    <div>
        <a href="index.html">Catalogo</a>
        <a href="sondaggi.html" style="color: var(--orange); font-weight: bold;">🔥 Vota Gioco</a>
        <a href="admin.html" style="opacity: 0.6;">Admin</a>
    </div>
</nav>

<header><h1>🔥 Partecipa al Sondaggio</h1></header>

<div class="container">
    <aside class="sidebar-left">
        <h3>👤 Identificati</h3>
        <div class="filter-group">
            <label>Tuo Username</label>
            <input type="text" id="username" placeholder="Inserisci nome..." oninput="renderizzaTutto()">
        </div>
        <hr>
        <h3>🔍 Filtri Extra</h3>
        <div class="filter-group">
            <label>Categoria</label>
            <select id="f-type" onchange="renderizzaTutto()">
                <option value="all">Tutte le categorie</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Tempo Max (min)</label>
            <input type="number" id="f-time" placeholder="Es: 60" oninput="renderizzaTutto()">
        </div>
    </aside>

    <main>
        <div id="status-sondaggio" style="margin-bottom: 15px; font-weight: bold; color: var(--primary);"></div>
        <div id="game-grid" class="game-grid"></div>
    </main>

    <aside class="sidebar-right">
        <h3>📊 Classifica</h3>
        <div id="classifica-voti">Caricamento...</div>
    </aside>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyBVH44nqpTmS8o8i1mzlEdgUPhAfp8EiG0hvmJOiGigWR0NO3aajMjhtNHcWpwOt4z/exec"; // <--- METTI IL TUO URL QUI
    let databaseGiochi = [];
    let datiSondaggi = { sondaggi: [], voti: [] };

    // 1. Carica il tuo file JSON locale
    async function caricaGiochi() {
        try {
            const response = await fetch('giochi.json');
            databaseGiochi = await response.json();
             popolaFiltroCategorie();
        } catch (e) {
            console.error("Errore caricamento giochi.json", e);
        }
    }

    function popolaFiltroCategorie() {
        const select = document.getElementById('filterType');
        const categorie = [...new Set(databaseGiochi.map(g => g.type))].sort();
        categorie.forEach(cat => {
            let opt = document.createElement('option');
            opt.value = cat;
            opt.innerHTML = cat;
            select.appendChild(opt);
        });
    }

    // 2. Recupera sondaggi e voti dal Foglio Google
    async function aggiornaDati() {
        try {
            const response = await fetch(WEB_APP_URL);
            datiSondaggi = await response.json();
            renderizzaSondaggi();
            document.getElementById('controlli-ricerca').style.display = 'block';
        } catch (e) {
            document.getElementById('listaSondaggi').innerHTML = "Errore di connessione al database.";
        }
    }

    function calcolaClassifica() {
    const area = document.getElementById('risultatiClassifica');
    if (datiSondaggi.voti.length === 0) {
        area.innerHTML = "<p>Nessun voto ancora pervenuto.</p>";
        return;
    }

    // Contiamo i voti per ogni gioco
    const conteggio = {};
    datiSondaggi.voti.forEach(v => {
        conteggio[v.gioco] = (conteggio[v.gioco] || 0) + 1;
    });

    // Ordiniamo per chi ha più voti
    const classificaOrdinata = Object.entries(conteggio).sort((a, b) => b[1] - a[1]);

    let html = "<ul style='list-style: none; padding: 0;'>";
    classificaOrdinata.forEach(([gioco, voti]) => {
        html += `<li style="padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
                    <span><strong>${gioco}</strong></span>
                    <span style="background: var(--accent); color: white; padding: 2px 10px; border-radius: 15px;">${voti} voti</span>
                 </li>`;
    });
    html += "</ul>";
    area.innerHTML = html;
}

// Chiama questa funzione dentro renderizzaSondaggi() alla fine!
// Inserisci calcolaClassifica(); come ultima riga di renderizzaSondaggi
    
    function renderizzaSondaggi() {
        const container = document.getElementById('listaSondaggi');
        const user = document.getElementById('username').value.trim();
        const fCat = document.getElementById('filterType').value;
        const fTime = parseInt(document.getElementById('filterTime').value);
        
        const sondaggiAttivi = datiSondaggi.sondaggi.filter(s => s.stato === "Attivo");

        if (sondaggiAttivi.length === 0) {
            container.innerHTML = "<p>Al momento non ci sono sondaggi aperti dall'admin.</p>";
            return;
        }

        container.innerHTML = "";
        
        sondaggiAttivi.forEach(s => {
            const card = document.createElement('div');
            card.className = 'sondaggio-card';
            card.innerHTML = `<h3>Sondaggio per ${s.giocatori} Giocatori</h3>`;

            // Filtro 1: Numero giocatori (obbligatorio da sondaggio)
            let filtrati = databaseGiochi.filter(g => s.giocatori >= g.minP && s.giocatori <= g.maxP);
            
            // Filtro 2: Categoria (opzionale da utente)
            if(fCat) filtrati = filtrati.filter(g => g.type === fCat);
            
            // Filtro 3: Tempo (opzionale da utente)
            if(fTime) filtrati = filtrati.filter(g => g.time <= fTime);

            filtrati.forEach(gioco => {
                // Controllo se l'utente ha già votato QUESTO gioco in QUESTO specifico sondaggio
                const giaVotato = datiSondaggi.voti.some(v => 
                    v.idSondaggio === s.id && 
                    v.username.toLowerCase() === user.toLowerCase() && 
                    v.gioco === gioco.name
                );

                const item = document.createElement('div');
                item.className = 'gioco-item';
                item.innerHTML = `
                    <img src="${gioco.thumb}" class="gioco-img">
                    <div class="gioco-info">
                        <h4>${gioco.name}</h4>
                        <div class="gioco-meta">
                            <span class="badge">${gioco.type}</span>
                            <span>⏱️ ${gioco.time} min</span> | <span>⚖️ ${gioco.difficulty}</span>
                        </div>
                    </div>
                    <button class="btn-vota" 
                        ${giaVotato || !user ? 'disabled' : ''} 
                        onclick="vota('${s.id}', '${gioco.name.replace(/'/g, "\\'")}')">
                        ${giaVotato ? 'Votato' : 'Vota'}
                    </button>
                `;
                card.appendChild(item);
            });
            container.appendChild(card);
        });
        calcolaClassifica();
    }

    async function vota(idSondaggio, nomeGioco) {
        const user = document.getElementById('username').value.trim();
        if(!user) {
            alert("Devi inserire un username per votare!");
            return;
        }

        try {
            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({
                    azione: "vota",
                    idSondaggio: idSondaggio,
                    username: user,
                    gioco: nomeGioco
                })
            });
            const data = await res.json();
            if(data.success) {
                alert("Voto registrato con successo!");
                aggiornaDati(); // Ricarica per bloccare il tasto
            } else {
                alert(data.errore);
            }
        } catch (e) {
            alert("Errore durante l'invio del voto.");
        }
    }

    // Inizializzazione
    caricaGiochi().then(() => {
        aggiornaDati();
        // Auto-aggiornamento ogni 10 secondi per nuovi voti/sondaggi
        setInterval(aggiornaDati, 10000);
    });
</script>

</body>
</html>
