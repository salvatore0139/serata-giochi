<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludoteca Salvatore0139</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: #16213e; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #e94560; }
        .filter-section { background: #0f3460; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .game-card { display: flex; align-items: center; background: #1a1a2e; margin-bottom: 10px; padding: 15px; border-radius: 12px; border-left: 5px solid #e94560; }
        .game-img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; margin-right: 15px; }
        .game-info { flex-grow: 1; }
        .vote-btn { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input { padding: 10px; margin: 5px 0; width: 100%; border-radius: 5px; border: none; box-sizing: border-box; }
        #voti-ricevuti { margin-top: 30px; background: #0f3460; padding: 15px; border-radius: 15px; }
        .admin-panel { margin-top: 50px; border-top: 1px dashed #555; padding-top: 20px; font-size: 0.8em; text-align: center; }
        .reset-btn { background: #555; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎲 Serata Salvatore0139</h1>
    
    <div class="filter-section">
        <input type="text" id="voter-name" placeholder="👤 Inserisci il tuo nome per votare">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="number" id="f-players" placeholder="Giocatori" value="4">
            <input type="number" id="f-time" placeholder="Minuti max" value="120">
        </div>
        <button onclick="caricaGiochi()" style="width:100%; background:#e94560; color:white; border:none; padding:12px; margin-top:10px; border-radius:8px; cursor:pointer; font-weight:bold;">🔍 CERCA GIOCHI</button>
    </div>

    <div id="game-list"></div>

    <div id="voti-ricevuti">
        <h3>📊 Classifica Voti:</h3>
        <div id="lista-voti">Caricamento...</div>
    </div>

    <div class="admin-panel">
        <p>Area Proprietario</p>
        <button class="reset-btn" onclick="resetVoti()">🗑️ Resetta tutto il sondaggio</button>
    </div>
</div>

<script>
    const BGG_USER = "Salvatore0139";
    const DB_URL = "INCOLLA_IL_TUO_URL_APPS_SCRIPT_QUI";

    async function caricaGiochi() {
        const listDiv = document.getElementById('game-list');
        listDiv.innerHTML = "<p style='text-align:center;'>Consulto la tua ludoteca su BGG...</p>";
        
        try {
            const response = await fetch(`https://boardgamegeek.com/xmlapi2/collection?username=${BGG_USER}&own=1&stats=1`);
            const text = await response.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");
            const items = Array.from(xml.querySelectorAll("item"));

            const pFilter = parseInt(document.getElementById('f-players').value);
            const tFilter = parseInt(document.getElementById('f-time').value);

            listDiv.innerHTML = "";
            items.forEach(item => {
                const name = item.querySelector("name").textContent;
                const thumb = item.querySelector("thumbnail") ? item.querySelector("thumbnail").textContent : "https://via.placeholder.com/70";
                const stats = item.querySelector("stats");
                const minP = parseInt(stats.getAttribute("minplayers"));
                const maxP = parseInt(stats.getAttribute("maxplayers"));
                const time = parseInt(stats.getAttribute("playingtime"));

                if (pFilter >= minP && pFilter <= maxP && time <= tFilter) {
                    listDiv.innerHTML += `
                        <div class="game-card">
                            <img src="${thumb}" class="game-img">
                            <div class="game-info">
                                <strong>${name}</strong><br>
                                <small>👥 ${minP}-${maxP} | ⏱ ${time} min</small>
                            </div>
                            <button class="vote-btn" onclick="vota('${name.replace(/'/g, "\\'")}')">VOTA</button>
                        </div>`;
                }
            });
            if(listDiv.innerHTML === "") listDiv.innerHTML = "Nessun gioco trovato con questi filtri.";
        } catch (e) {
            listDiv.innerHTML = "Errore nel caricamento. Riprova tra 5 secondi (BGG è lento).";
        }
    }

    async function vota(gameName) {
        const user = document.getElementById('voter-name').value.trim();
        if (!user) return alert("Inserisci il tuo nome prima di votare!");

        await fetch(DB_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({username: user, game: gameName, vote: 1})
        });
        alert("Voto registrato!");
        setTimeout(caricaVoti, 1000);
    }

    async function caricaVoti() {
        const response = await fetch(DB_URL);
        const data = await response.json();
        const lista = document.getElementById('lista-voti');
        if(data.length <= 1) {
            lista.innerHTML = "Nessun voto presente.";
            return;
        }
        // Saltiamo la prima riga (intestazione)
        lista.innerHTML = data.slice(1).reverse().map(row => `• <b>${row[1]}</b> vuole giocare a <i>${row[2]}</i>`).join('<br>');
    }

    async function resetVoti() {
        const pass = prompt("Inserisci password admin per resettare:");
        if (pass === "1234") { // Puoi cambiare la password qui
            await fetch(DB_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({action: "reset"})
            });
            alert("Sondaggio svuotato!");
            location.reload();
        } else {
            alert("Password errata!");
        }
    }

    caricaVoti();
</script>

</body>
</html>
