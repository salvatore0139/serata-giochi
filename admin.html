<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Salvatore</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #ecf0f1; --text: #333; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: none; }
        nav { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; color: white; }
        nav a { color: white; text-decoration: none; margin-left: 15px; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h3 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-crea { background: var(--accent); color: white; }
        .btn-crea:disabled { background: #ccc; cursor: not-allowed; }
        .btn-chiudi { background: var(--danger); color: white; padding: 8px 15px; width: auto; }
        .poll-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body id="adminBody">

<nav>
    <div style="font-weight: bold;">🛠️ Pannello Admin</div>
    <div>
        <a href="index.html">Catalogo</a>
        <a href="sondaggi.html">Vedi Sondaggi</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h3>🚀 Nuovo Sondaggio</h3>
        <div id="avviso-attivo" style="color: var(--danger); font-weight: bold; margin-bottom: 10px; display: none;">
            ⚠️ C'è già un sondaggio attivo! Chiudilo per crearne uno nuovo.
        </div>
        <input type="number" id="numGiocatori" placeholder="Numero Giocatori (es. 4)">
        <button id="btnCreazione" class="btn btn-crea" onclick="creaSondaggio()">AVVIA SESSIONE</button>
    </div>

    <div class="card">
        <h3>📊 Gestione Attivi</h3>
        <div id="listaSondaggi"></div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyBVH44nqpTmS8o8i1mzlEdgUPhAfp8EiG0hvmJOiGigWR0NO3aajMjhtNHcWpwOt4z/exec";
    const PASSWORD_CORRETTA = "newtech1";
    let dati = { sondaggi: [] };

    function verificaAccesso() {
        if (prompt("Password:") === PASSWORD_CORRETTA) {
            document.getElementById('adminBody').style.display = 'block';
            caricaDati();
        } else {
            alert("Negato!");
            window.location.href = "index.html";
        }
    }

    async function caricaDati() {
        const res = await fetch(WEB_APP_URL);
        dati = await res.json();
        
        const lista = document.getElementById('listaSondaggi');
        const btnCrea = document.getElementById('btnCreazione');
        const avviso = document.getElementById('avviso-attivo');
        
        const attivo = dati.sondaggi.find(s => s.stato === "Attivo");
        
        if(attivo) {
            btnCrea.disabled = true;
            avviso.style.display = 'block';
            lista.innerHTML = `
                <div class="poll-item">
                    <span>Sondaggio per ${attivo.giocatori} giocatori (${attivo.data})</span>
                    <button class="btn btn-chiudi" onclick="chiudi('${attivo.id}')">CHIUDI</button>
                </div>`;
        } else {
            btnCrea.disabled = false;
            avviso.style.display = 'none';
            lista.innerHTML = "Nessun sondaggio attivo.";
        }
    }

    async function creaSondaggio() {
        const n = document.getElementById('numGiocatori').value;
        if(!n) return alert("Inserisci i giocatori!");
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ azione: "creaSondaggio", giocatori: n }) });
        caricaDati();
    }

    async function chiudi(id) {
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ azione: "chiudiSondaggio", id: id }) });
        caricaDati();
    }

    verificaAccesso();
</script>
</body>
</html>
